name: RetrievalCI CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-and-evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e '.[dev]'

      - name: Lint
        run: .venv/bin/python -m ruff check retrievalci tests scripts

      - name: Unit tests
        run: .venv/bin/python -m pytest -q

      - name: RetrievalCI CI evaluation
        run: .venv/bin/retrievalci ci run --config examples/retrievalci.ci.yaml

      - name: Upload RetrievalCI run artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retrievalci-run
          path: .retrievalci/runs
          if-no-files-found: ignore
