# =============================================================================
# RetrievalCI — Predicate Vocabulary v0.1.0
# =============================================================================
#
# This is the closed predicate vocabulary the claim extractor is allowed to
# emit. Every claim's `predicate` column must canonicalize to a `name` here.
# Aliases listed under each predicate are LLM-likely paraphrases that the
# validator normalizes at write time.
#
# Adding a new predicate is a PR against this file. The taxonomy-evolve
# weekly job proposes additions clustered from the predicate-proposal queue;
# a human merges. Do not auto-merge.
#
# Field reference:
#   name                  — canonical form. Snake_case. Stored verbatim in BQ.
#   arity                 — 1 (subject only) or 2 (subject + object)
#   subject_type          — entity type expected (pipe-separated for unions)
#   object_type           — entity type or scalar for arity-2 predicates
#   aliases               — paraphrases the validator normalizes
#   inverse               — paired predicate auto-asserted (or null)
#   transitive            — bool; if true, query-time closure applies
#   transitive_depth_cap  — max hops (only when transitive=true)
#   version_added         — schema_version this entered
#   version_deprecated    — schema_version this was deprecated (or null)
#   contradiction_rules   — declarative rules for the contradiction lint pass
# =============================================================================

schema_version: "0.1.0"
domain_focus: "operational engineering knowledge — services, runbooks, incidents"

entity_types:
  - entity:service
  - entity:library
  - entity:endpoint
  - entity:database
  - entity:event_type
  - entity:team
  - entity:rotation
  - entity:document
  - entity:auth_method
  - entity:incident

predicates:

  # ---------- Lifecycle ----------
  is_deprecated:
    arity: 1
    subject_type: entity:service|entity:library|entity:endpoint
    aliases: [deprecated, marked_deprecated, EOL, end_of_life, retired, obsolete, sunset, sunsetting]
    inverse: null
    transitive: false
    version_added: "0.1.0"
    contradiction_rules:
      - id: "deprecated_dep"
        rule: "if (X is_deprecated) and (Y depends_on X) and (NOT Y is_deprecated), flag"
        severity: warn

  supersedes:
    arity: 2
    subject_type: entity:document|entity:service
    object_type:  entity:document|entity:service
    aliases: [replaces, replaces_doc, replaces_service]
    inverse: superseded_by
    transitive: true
    transitive_depth_cap: 5
    version_added: "0.1.0"

  # ---------- Architecture ----------
  depends_on:
    arity: 2
    subject_type: entity:service
    object_type:  entity:service|entity:library|entity:database
    aliases: [requires, calls, uses, invokes, talks_to]
    inverse: depended_on_by
    transitive: true
    transitive_depth_cap: 5
    version_added: "0.1.0"

  uses_database:
    arity: 2
    subject_type: entity:service
    object_type:  entity:database
    aliases: [persists_to, stores_in, backed_by]
    inverse: null
    transitive: false
    version_added: "0.1.0"

  exposes_api:
    arity: 2
    subject_type: entity:service
    object_type:  entity:endpoint
    aliases: [provides, hosts, serves]
    inverse: null
    transitive: false
    version_added: "0.1.0"

  authenticates_via:
    arity: 2
    subject_type: entity:service
    object_type:  entity:auth_method
    aliases: [auth_method, uses_auth]
    inverse: null
    transitive: false
    version_added: "0.1.0"

  # ---------- Eventing ----------
  emits_event:
    arity: 2
    subject_type: entity:service
    object_type:  entity:event_type
    aliases: [publishes, produces, fires]
    inverse: emitted_by
    transitive: false
    version_added: "0.1.0"

  consumes_event:
    arity: 2
    subject_type: entity:service
    object_type:  entity:event_type
    aliases: [subscribes_to, listens_for, handles]
    inverse: consumed_by
    transitive: false
    version_added: "0.1.0"

  # ---------- Ownership ----------
  owned_by:
    arity: 2
    subject_type: entity:service|entity:document|entity:database
    object_type:  entity:team
    aliases: [team, owner, owning_team, maintained_by]
    inverse: null
    transitive: false
    version_added: "0.1.0"

  has_oncall:
    arity: 2
    subject_type: entity:service
    object_type:  entity:rotation
    aliases: [oncall, on_call_rotation, paged_via]
    inverse: null
    transitive: false
    version_added: "0.1.0"

  has_runbook:
    arity: 2
    subject_type: entity:service
    object_type:  entity:document
    aliases: [runbook, runbook_doc, has_playbook]
    inverse: null
    transitive: false
    version_added: "0.1.0"

  # ---------- Declared operational state (from docs) ----------
  autoscales_to:
    arity: 2
    subject_type: entity:service
    object_type:  scalar:int           # max replica count from runbook/SLO
    aliases: [scales_to_max, max_replicas, replica_cap]
    inverse: null
    transitive: false
    version_added: "0.1.0"
    contradiction_rules:
      - id: "autoscale_observed_mismatch"
        rule: "if (X autoscales_to N) and (X observed_max_replicas M) and (M < N) for >= 14d, flag"
        severity: critical

  # ---------- Observed operational state (from telemetry) ----------
  observed_max_replicas:
    arity: 2
    subject_type: entity:service
    object_type:  scalar:int
    aliases: [seen_replicas_peak, peak_replicas]
    inverse: null
    transitive: false
    version_added: "0.1.0"
    notes: "Set by the materialization layer from rolling-window telemetry."

  observed_p99_latency_ms:
    arity: 2
    subject_type: entity:service
    object_type:  scalar:float
    aliases: [p99_latency, p99_observed]
    inverse: null
    transitive: false
    version_added: "0.1.0"
    notes: "Materialized from telemetry rolling window. Not a long-lived claim — TTL 7 days, supersede on next window."

  last_deployed_at:
    arity: 2
    subject_type: entity:service
    object_type:  scalar:timestamp
    aliases: [last_release, last_deploy_ts]
    inverse: null
    transitive: false
    version_added: "0.1.0"

# =============================================================================
# Vocabulary policy
# =============================================================================
#
# Mismatches between extracted predicate and this vocabulary do NOT cause hard
# rejection. The ingestion pipeline routes them to predicate_proposal_queue
# with full context (subject, object, source, prompt_id) for the weekly
# taxonomy-evolve job to cluster.
#
# Predicate deprecation: set version_deprecated and provide migration guidance
# under a `replaced_by:` field. Existing claims are migrated by writing new
# rows with the canonical predicate and pointing superseded_by_claim_id back.
#
# Each new predicate added must include at least 3 aliases or a justification
# for why none exist (rare — true for invented vocabulary specific to the org).
